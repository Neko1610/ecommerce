name: ecommerce_app
description: "VEXO Ecommerce App"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  firebase_core: ^4.0.0
  firebase_auth: ^6.0.0
  google_sign_in: ^6.2.1

  shared_preferences: ^2.5.3
  http: ^1.5.0
  provider: ^6.1.5
  intl: ^0.20.2

  google_maps_flutter: ^2.12.3
  geolocator: ^14.0.0
  geocoding: ^4.0.0

  flutter_map: ^8.1.1
  latlong2: ^0.9.1

  google_fonts: ^6.2.1

  webview_flutter: ^4.7.0
  flutter_slidable: ^3.1.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  image_path: "assets/logo/vexo_logo1.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/logo/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf

        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500

        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600

        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700